services:
  db:
    image: postgres:16-alpine
    container_name: sessions-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sessions_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-sessions_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sessions_user} -d ${POSTGRES_DB:-sessions_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sessions_network

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: sessions-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sessions_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BACKEND_DOCKER_TARGET:-runtime}
    container_name: sessions-backend
    restart: unless-stopped
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sessions_user}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-sessions_marketplace}
      AWS_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    networks:
      - sessions_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
    container_name: sessions-frontend
    restart: unless-stopped
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      INTERNAL_API_BASE_URL: http://backend:8000/api
    depends_on:
      - backend
    expose:
      - "3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
    networks:
      - sessions_network

  nginx:
    image: nginx:1.27-alpine
    container_name: sessions-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
    networks:
      - sessions_network

volumes:
  postgres_data:
  minio_data:
  backend_static:
  backend_media:

networks:
  sessions_network:
    driver: bridge
